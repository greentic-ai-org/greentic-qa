name: Dev Publish crates (qa)

on:
  push:
    branches: [ develop ]
  workflow_dispatch: {}

jobs:
  build-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.91.0
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: |
          cargo fmt --all -- --check
          cargo clippy --workspace --all-targets -- -D warnings
          cargo build --workspace --all-features
          cargo test --workspace --all-features -- --nocapture

  publish:
    needs: build-test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@1.91.0
      - uses: Swatinem/rust-cache@v2
      - uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-north-1
      - name: Get CodeArtifact Token
        run: |
          token=$(aws codeartifact get-authorization-token --domain ${{ secrets.CODEARTIFACT_DOMAIN }} --domain-owner ${{ secrets.CODEARTIFACT_DOMAIN_OWNER }} --region eu-north-1 --query authorizationToken --output text)
          echo "::add-mask::$token"
          echo "CARGO_REGISTRIES_CORP_ARTIFACTS_GREENTIC_TOKEN=$token" >> $GITHUB_ENV
      - name: Configure CodeArtifact Registry
        run: |
          mkdir -p .cargo
          cp ci/cargo-config-dev.toml .cargo/config.toml
      - name: Setup GitVersion
        uses: gittools/actions/gitversion/setup@v1
        with:
          versionSpec: "5.x"
      - name: Compute version
        id: gitversion
        uses: gittools/actions/gitversion/execute@v1
        with:
          useConfigFile: true
          configFilePath: GitVersion.yml
      - name: Set crate dev version
        run: |
          VERSION="${{ steps.gitversion.outputs.MajorMinorPatch }}-dev.${{ github.run_number }}"
          sed -i -E "0,/^version\s*=\s*\"[^\"]+\"/s//version = \"$VERSION\"/" Cargo.toml
      - name: Publish crates to CodeArtifact
        shell: bash
        run: |
          set -euo pipefail
          for crate in qa-spec component-qa greentic-qa-lib; do
            echo "Publishing $crate"
            set +e
            output="$(cargo publish -p "$crate" --registry corp-artifacts-greentic --allow-dirty 2>&1)"
            status=$?
            set -e
            echo "$output"
            if [ "$status" -ne 0 ]; then
              if echo "$output" | grep -E -q "already uploaded|already exists|version .* is already in use|already exists on crates.io index"; then
                echo "Crate $crate already published, continuing."
              else
                echo "Publish failed for $crate" >&2
                exit "$status"
              fi
            fi
            sleep 5
          done
      - name: Create git tag only after successful publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.gitversion.outputs.MajorMinorPatch }}-dev.${{ github.run_number }}"
          if gh api "repos/${{ github.repository }}/git/ref/tags/$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists"
          else
            gh api "repos/${{ github.repository }}/git/refs" -X POST -f ref="refs/tags/$TAG" -f sha="${GITHUB_SHA}"
          fi

