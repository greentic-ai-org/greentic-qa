name: Publish dev to CodeArtifact

on:
  push:
    branches: ["develop"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-dev:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: gittools/actions/gitversion/setup@v3
        with:
          versionSpec: "6.x"

      - id: gitversion
        uses: gittools/actions/gitversion/execute@v3
        with:
          useConfigFile: true
          configFilePath: GitVersion.yml

      - uses: dtolnay/rust-toolchain@stable

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Fetch CodeArtifact token
        run: |
          TOKEN=$(aws codeartifact get-authorization-token \
            --domain ${{ secrets.CODEARTIFACT_DOMAIN }} \
            --domain-owner ${{ secrets.CODEARTIFACT_DOMAIN_OWNER }} \
            --region eu-north-1 \
            --query authorizationToken \
            --output text)
          echo "::add-mask::$TOKEN"
          echo "CARGO_REGISTRIES_CORP_ARTIFACTS_GREENTIC_TOKEN=$TOKEN" >> "$GITHUB_ENV"
      - name: Configure Cargo registry
        run: |
          mkdir -p .cargo
          cat > .cargo/config.toml << 'EOF'
          [registries.corp-artifacts-greentic]
          index = "sparse+https://corp-artifacts-599558443099.d.codeartifact.eu-north-1.amazonaws.com/cargo/greentic/"
          credential-provider = "cargo:token"
          EOF

      - name: Set version in Cargo.toml
        id: ver
        run: |
          VERSION="${{ steps.gitversion.outputs.majorMinorPatch }}-dev.${{ github.run_number }}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          sed -i -E "s/^version\s*=\s*\".*\"/version = \"${VERSION}\"/" Cargo.toml
          sed -i -E "s#^qa-spec\\s*=.*#qa-spec = { path = \"crates/qa-spec\", version = \"=${VERSION}\" }#" Cargo.toml
          sed -i -E "s#^component-qa\\s*=.*#component-qa = { path = \"crates/component-qa\", version = \"=${VERSION}\" }#" Cargo.toml
          sed -i -E "s#^greentic-qa-lib\\s*=.*#greentic-qa-lib = { path = \"crates/qa-lib\", version = \"=${VERSION}\" }#" Cargo.toml
          echo "Publishing version: ${VERSION}"
          grep '^version\s*=\s*' Cargo.toml

      - name: Publish crate (gate)
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.ver.outputs.version }}"

          publish_one() {
            local crate="$1"
            local manifest_path="$2"
            local attempts=8
            local delay=15

            for i in $(seq 1 "$attempts"); do
              echo "Publishing ${crate} (attempt ${i}/${attempts})"
              set +e
              output="$(cargo publish -p "${crate}" --manifest-path "${manifest_path}" --registry corp-artifacts-greentic --allow-dirty 2>&1)"
              status=$?
              set -e
              echo "${output}"

              if [ "${status}" -eq 0 ]; then
                return 0
              fi

              if echo "${output}" | grep -E -q "already uploaded|already exists|version .* is already in use|already exists on crates.io index"; then
                echo "Crate ${crate} is already published, continuing."
                return 0
              fi

              if [ "${i}" -lt "${attempts}" ]; then
                if echo "${output}" | grep -E -q "failed to select a version for the requirement|candidate versions found which didn't match"; then
                  echo "Dependency version is not visible in the registry index yet, waiting ${delay}s before retry..."
                else
                  echo "Publish failed for ${crate}, retrying in ${delay}s..."
                fi
                sleep "${delay}"
                continue
              fi

              echo "Publish failed for ${crate} after ${attempts} attempts."
              return "${status}"
            done
          }

          publish_one qa-spec crates/qa-spec/Cargo.toml
          sed -i -E "s#^qa-spec\\s*=.*#qa-spec = { version = \"=${VERSION}\", registry = \"corp-artifacts-greentic\" }#" Cargo.toml
          publish_one component-qa crates/component-qa/Cargo.toml
          sed -i -E "s#^component-qa\\s*=.*#component-qa = { version = \"=${VERSION}\", registry = \"corp-artifacts-greentic\" }#" Cargo.toml
          publish_one greentic-qa-lib crates/qa-lib/Cargo.toml

      - name: Create git tag only after successful publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.ver.outputs.version }}"
          if gh api "repos/${{ github.repository }}/git/ref/tags/${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists"
          else
            gh api "repos/${{ github.repository }}/git/refs" -X POST -f ref="refs/tags/${TAG}" -f sha="${GITHUB_SHA}"
            echo "Created tag ${TAG}"
          fi

