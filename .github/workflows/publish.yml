name: Publish

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: write
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  publish_crates:
    needs: ci
    runs-on: ubuntu-latest
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.91.0

      - name: Publish crates
        run: |
          set -euo pipefail

          crate_paths=(
            crates/qa-spec
            crates/component-qa
            crates/qa-lib
            crates/qa-cli
          )

          for crate in "${crate_paths[@]}"; do
            echo "Publishing $crate"
            max_attempts=8
            attempt=1
            while true; do
              if output=$(cargo publish \
                --manifest-path "$crate/Cargo.toml" \
                --token "$CARGO_REGISTRY_TOKEN" \
                --locked 2>&1); then
                echo "$output"
                break
              fi

              echo "$output"
              if echo "$output" | grep -q "already exists on crates.io index"; then
                echo "$crate already published; skipping."
                break
              fi

              if echo "$output" | grep -q "no matching package named"; then
                if [[ "$attempt" -lt "$max_attempts" ]]; then
                  echo "Dependency index not updated yet for $crate (attempt $attempt/$max_attempts). Retrying in 20s..."
                  sleep 20
                  attempt=$((attempt + 1))
                  continue
                fi
              fi

              exit 1
            done
          done

  build_release_artifacts:
    needs: ci
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            arch: x64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            arch: arm64
          - os: windows-2025
            target: x86_64-pc-windows-msvc
            arch: x64
          - os: windows-11-arm
            target: aarch64-pc-windows-msvc
            arch: arm64
          - os: macos-15-intel
            target: x86_64-apple-darwin
            arch: x64
          - os: macos-15
            target: aarch64-apple-darwin
            arch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.91.0
          targets: ${{ matrix.target }}

      - name: Build greentic-qa
        run: cargo build --release -p greentic-qa --target ${{ matrix.target }} --locked

      - name: Package binary
        shell: bash
        run: |
          set -euo pipefail
          VERSION=$(awk -F'\"' '/^version = \"/{print $2; exit}' Cargo.toml)
          TARGET="${{ matrix.target }}"
          BIN_NAME="greentic-qa"
          if [[ "$TARGET" == *"windows"* ]]; then
            BIN_NAME="greentic-qa.exe"
          fi

          BIN_PATH="target/$TARGET/release/$BIN_NAME"
          if [[ ! -f "$BIN_PATH" ]]; then
            echo "Binary not found at $BIN_PATH"
            exit 1
          fi

          ARCHIVE_NAME="greentic-qa-${VERSION}-${TARGET}.tar.gz"
          tar -czf "$ARCHIVE_NAME" -C "target/$TARGET/release" "$BIN_NAME"
          echo "ARCHIVE_NAME=$ARCHIVE_NAME" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: ${{ env.ARCHIVE_NAME }}

  package_e2e_fixtures:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        run: |
          VERSION=$(awk -F'\"' '/^version = \"/{print $2; exit}' Cargo.toml)
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Package e2e fixtures
        run: |
          set -euo pipefail
          ARCHIVE_NAME="greentic-qa-e2e-${VERSION}.tar.gz"
          tar -czf "$ARCHIVE_NAME" e2e
          echo "ARCHIVE_NAME=$ARCHIVE_NAME" >> "$GITHUB_ENV"

      - name: Upload e2e artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-e2e
          path: ${{ env.ARCHIVE_NAME }}

  publish_release_assets:
    needs: [publish_crates, build_release_artifacts, package_e2e_fixtures]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        run: |
          VERSION=$(awk -F'\"' '/^version = \"/{print $2; exit}' Cargo.toml)
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: greentic-qa v${{ env.VERSION }}
          generate_release_notes: true
          files: |
            artifacts/**/*.tar.gz

  binstall_matrix:
    needs: [publish_release_assets]
    runs-on: ${{ matrix.os }}
    env:
      CARGO_BINSTALL_TARGET: ${{ matrix.target }}
    name: Binstall verification ${{ matrix.os }}-${{ matrix.arch }}
    strategy:
      matrix:
        include:
          - os: ubuntu-24.04
            arch: x64
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            arch: arm64
            target: aarch64-unknown-linux-gnu
          - os: windows-2025
            arch: x64
            target: x86_64-pc-windows-msvc
          - os: windows-11-arm
            arch: arm64
            target: aarch64-pc-windows-msvc
          - os: macos-15-intel
            arch: x64
            target: x86_64-apple-darwin
          - os: macos-15
            arch: arm64
            target: aarch64-apple-darwin
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.91.0

      - name: Install cargo-binstall
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-binstall

      - name: Inspect scripts directory
        run: |
          bash --version
          pwd
          ls -la ci/scripts

      - name: Run binstall verification
        run: bash ci/scripts/binstall_verify.sh

  smoke:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.91.0

      - name: Run smoke tests
        run: |
          bash --version
          pwd
          ls -la ci/scripts
          bash ci/scripts/smoke.sh
