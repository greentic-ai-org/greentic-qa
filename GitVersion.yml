mode: ContinuousDeployment
next-version: 0.4.14
branches:
  develop:
    regex: ^develop$
    label: dev
    increment: Patch
  release:
    regex: ^release$
    label: ""
    increment: Patch
  master:
    regex: ^master$
    label: ""
    increment: Patch
  main:
    regex: ^main$
    label: ""
    increment: Patch